/* ============================================================
   0. RESET & FOUNDATIONS
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {

  --accent-dim:    hsla(225, 100%, 62%, 0.12);
  --accent2:       hsl(270, 90%, 65%);
  --accent2-glow:  hsla(270, 90%, 65%, 0.30);
  --gradient:      linear-gradient(135deg, var(--accent), var(--accent2));

  --green:      hsl(145, 72%, 50%);
  --green-glow: hsla(145, 72%, 50%, 0.35);
  --orange:     hsl(24, 100%, 55%);
  --orange-glow:hsla(24, 100%, 55%, 0.4);

  --font-display: 'Poppins', sans-serif;
  --font-body:    'Inter', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
  --space-4: 16px; --space-5: 20px; --space-6: 24px;
  --space-7: 32px; --space-8: 48px;

  --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px;

  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --progress-h: 3px;
}

html, body {
  height: 100%; overflow: hidden; background: var(--bg-deep); color: var(--text-primary);
  font-family: var(--font-body); -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
}

.progress-bar { position: fixed; top: var(--safe-top); left: 0; right: 0; z-index: 200; display: flex; gap: 3px; padding: var(--space-2) var(--space-3) 0; pointer-events: none; }

.progress-segment::after { content: ''; position: absolute; inset: 0; border-radius: 2px; background: var(--gradient); transform: scaleX(0); transform-origin: left; transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

.header { position: fixed; top: calc(var(--safe-top) + var(--progress-h) + var(--space-2)); left: 0; right: 0; z-index: 150; display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-4); pointer-events: none; }
.header > * { pointer-events: auto; }
.header-title { font-family: var(--font-display); font-weight: 800; font-size: 0.85rem; letter-spacing: 0.04em; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
.header-chapter { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }
.header-right { display: flex; gap: var(--space-2); align-items: center; }

.pill { display: flex; align-items: center; gap: var(--space-1); background: var(--bg-surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 4px 10px; font-size: 0.72rem; color: var(--text-secondary); cursor: pointer; transition: all 0.3s ease; }
.mood-pill:hover { border-color: var(--accent-glow); }
.streak-pill { color: var(--orange); font-weight: 700; border-color: rgba(255,100,0,0.2); }
.streak-pill.active { box-shadow: 0 0 15px var(--orange-glow); border-color: var(--orange); }
@keyframes firePulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.1); filter: brightness(1.2); } }
.streak-pill.active .emoji { animation: firePulse 1s ease-in-out infinite; }

/* ============================================================
   3. FEED & CARDS
   ============================================================ */
.feed { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; overscroll-behavior-y: contain; scrollbar-width: none; }
.feed::-webkit-scrollbar { display: none; }
@media (prefers-reduced-motion: no-preference) { .feed { scroll-behavior: smooth; } }

.card { height: 100dvh; scroll-snap-align: start; scroll-snap-stop: always; display: flex; align-items: center; justify-content: center; padding: var(--space-4); padding-top: calc(var(--safe-top) + 52px); padding-bottom: calc(var(--safe-bottom) + var(--space-7)); position: relative; user-select: none; -webkit-user-select: none; }
.card-inner { position: relative; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: var(--space-5); padding: var(--space-6) var(--space-5); border-radius: var(--radius-lg); background: var(--bg-card); backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); border: 1px solid rgba(255,255,255,0.06); overflow: hidden; transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease; }
.card-inner::before { content: ''; position: absolute; inset: -1px; border-radius: inherit; background: linear-gradient(135deg, var(--accent-glow), transparent 50%, var(--accent2-glow)); z-index: -1; opacity: 0; transition: opacity 0.6s ease; }
.card.is-active .card-inner::before { opacity: 1; }
.card::before { content: ''; position: absolute; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, var(--accent-glow), transparent 70%); top: 15%; left: -20%; filter: blur(60px); opacity: 0; transition: opacity 1s ease; pointer-events: none; }
.card::after { content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, var(--accent2-glow), transparent 70%); bottom: 20%; right: -15%; filter: blur(50px); opacity: 0; transition: opacity 1s ease; pointer-events: none; }
.card.is-active::before, .card.is-active::after { opacity: 1; }

.card-number { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }
.card-hook { font-family: var(--font-display); font-weight: 900; font-size: clamp(1.3rem, 5.5vw, 2rem); line-height: 1.15; color: var(--text-primary); letter-spacing: -0.02em; }
.card-story { font-size: 0.88rem; line-height: 1.6; color: var(--text-secondary); max-width: 38ch; }
.card-formula { font-family: var(--font-mono); font-weight: 700; font-size: clamp(1.15rem, 4.5vw, 1.45rem); color: var(--accent-bright); text-align: center; padding: var(--space-5) var(--space-4); background: rgba(0,0,0,0.35); border: 1px solid var(--accent-dim); border-radius: var(--radius-md); position: relative; overflow: hidden; letter-spacing: 0.02em; line-height: 1.5; }
.card-formula sup { font-size: 0.65em; vertical-align: super; }
.card-formula sub { font-size: 0.65em; vertical-align: sub; }
.card-formula .vec { text-decoration: overline; }
.card-formula::after { content: ''; position: absolute; inset: -1px; border-radius: inherit; border: 1px solid transparent; background: linear-gradient(135deg, var(--accent-glow), transparent, var(--accent2-glow)) border-box; mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
@keyframes formulaGlow { 0%, 100% { box-shadow: 0 0 15px var(--accent-glow), inset 0 0 15px rgba(0,0,0,0.2); } 50% { box-shadow: 0 0 30px var(--accent-glow), 0 0 60px var(--accent-dim), inset 0 0 15px rgba(0,0,0,0.2); } }
.card.is-active .card-formula { animation: formulaGlow 3s ease-in-out infinite; }
.card-analogy { font-size: 0.8rem; font-style: italic; color: var(--text-muted); line-height: 1.5; padding-left: var(--space-3); border-left: 2px solid var(--accent-dim); }
.card-analogy .analogy-icon { font-style: normal; margin-right: var(--space-1); }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.topic-pill { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); background: var(--accent-dim); padding: 4px 10px; border-radius: 12px; }

.card-hook, .card-story, .card-formula, .card-analogy, .card-footer { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
.card.is-active .card-hook { opacity: 1; transform: translateY(0); transition-delay: 0.05s; }
.card.is-active .card-story { opacity: 1; transform: translateY(0); transition-delay: 0.12s; }
.card.is-active .card-formula { opacity: 1; transform: translateY(0); transition-delay: 0.20s; }
.card.is-active .card-analogy { opacity: 1; transform: translateY(0); transition-delay: 0.30s; }
.card.is-active .card-footer { opacity: 1; transform: translateY(0); transition-delay: 0.38s; }
.card-number { transition: opacity 0.4s ease; }

/* ============================================================
   4. VARIABLE REWARDS & MASTERED STATE
   ============================================================ */
.card.is-mastered .card-inner { border-color: var(--green-glow); }
.mastered-badge { display: none; position: absolute; top: var(--space-4); right: var(--space-4); width: 28px; height: 28px; border-radius: 50%; background: var(--green); align-items: center; justify-content: center; box-shadow: 0 0 12px var(--green-glow); z-index: 5; }
.mastered-badge svg { width: 16px; height: 16px; }
.card.is-mastered .mastered-badge { display: flex; }

@keyframes masteredPulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 var(--green-glow); } 50% { transform: scale(1.02); box-shadow: 0 0 30px var(--green-glow); } 100% { transform: scale(1); box-shadow: 0 0 0 0 transparent; } }
.card.mastering .card-inner { animation: masteredPulse 0.6s ease; }

@keyframes edgeFlash { 0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; } }
.edge-flash { position: fixed; inset: 0; z-index: 300; pointer-events: none; border: 3px solid var(--green); border-radius: 0; opacity: 0; box-shadow: inset 0 0 40px var(--green-glow); }
.edge-flash.flash { animation: edgeFlash 0.5s ease-out; }

/* Variable Rewards CSS */
.reward-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); font-family: var(--font-display); font-weight: 900; font-size: 3rem; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 30px var(--orange); z-index: 200; opacity: 0; pointer-events: none; }
@keyframes rareReward { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1) rotate(5deg); } 80% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); } }
.reward-text.show { animation: rareReward 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

.confetti-container { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 100; }
.confetti { position: absolute; width: 10px; height: 10px; background: var(--accent); opacity: 0; animation: fall linear forwards; }
@keyframes fall { 0% { opacity: 1; transform: translateY(-50px) rotate(0deg); } 100% { opacity: 0; transform: translateY(100dvh) rotate(360deg); } }

/* ============================================================
   5. END CARD (Next Chapter Tease)
   ============================================================ */
.end-card { text-align: center; }
.end-card .card-hook { font-size: 2.5rem !important; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.end-card .card-story { font-size: 1.1rem; margin-top: var(--space-4); }
.unlock-btn { margin-top: var(--space-6); background: var(--gradient); border: none; padding: var(--space-3) var(--space-6); border-radius: var(--radius-xl); color: #fff; font-family: var(--font-display); font-weight: 800; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 30px var(--accent-glow); }
.unlock-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 40px var(--accent-glow); }

/* ============================================================
   6. MISC & RESPONSIVE
   ============================================================ */
@keyframes bounceUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.swipe-hint { position: absolute; bottom: calc(var(--safe-bottom) + var(--space-5)); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: var(--space-1); color: var(--text-muted); font-size: 0.7rem; letter-spacing: 0.04em; animation: bounceUp 1.8s ease-in-out infinite; pointer-events: none; transition: opacity 0.5s ease; }
.swipe-hint svg { width: 20px; height: 20px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.swipe-hint.hidden { opacity: 0; }

.mood-overlay { position: fixed; inset: 0; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(4, 4, 12, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: opacity 0.5s ease, visibility 0.5s ease; }
.mood-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.mood-overlay-brand { font-family: var(--font-display); font-weight: 900; font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--space-2); }
.mood-overlay-sub { color: var(--text-muted); font-size: 0.85rem; margin-bottom: var(--space-8); }
.mood-options { display: flex; gap: var(--space-4); }
.mood-btn { display: flex; flex-direction: column; align-items: center; gap: var(--space-3); background: var(--bg-surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius-lg); padding: var(--space-6) var(--space-5); width: 105px; cursor: pointer; transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1); color: var(--text-primary); font-family: var(--font-body); }
.mood-btn:hover { transform: translateY(-4px) scale(1.04); border-color: var(--accent-glow); box-shadow: 0 8px 30px var(--accent-glow); }
.mood-btn .emoji { font-size: 2rem; }
.mood-btn .label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }

/* Doubt FAB */
.doubt-fab { position: fixed; bottom: calc(var(--safe-bottom) + var(--space-6)); right: var(--space-4); z-index: 180; width: 48px; height: 48px; border-radius: 50%; background: var(--gradient); border: none; color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px var(--accent-glow); transition: all 0.3s ease; font-family: var(--font-display); }
.doubt-fab:hover { transform: scale(1.1); box-shadow: 0 6px 30px var(--accent-glow); }

@media (min-width: 600px) {
  .feed { max-width: 430px; margin: 0 auto; border-left: 1px solid rgba(255,255,255,0.04); border-right: 1px solid rgba(255,255,255,0.04); box-shadow: 0 0 80px rgba(0,0,0,0.5); }
  .progress-bar, .header { max-width: 430px; left: 50%; transform: translateX(-50%); }
  .doubt-fab { right: calc(50% - 215px + var(--space-4)); }
  .doubt-sheet { max-width: 430px; left: 50%; transform: translate(-50%, 100%); }
}

/* ============================================================
   8. PASSWORD LOCK SCREEN
   ============================================================ */
.lock-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: radial-gradient(circle at center, #0f0f23 0%, #05050a 100%);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.5s ease, visibility 0.5s ease;
}
.lock-overlay.hidden {
  opacity: 0; visibility: hidden; pointer-events: none;
}
.lock-card {
  background: rgba(14, 14, 26, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 40px; border-radius: 24px; width: 90%; max-width: 360px;
  text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.lock-icon { font-size: 3rem; margin-bottom: var(--space-3); }
.lock-title { font-family: var(--font-display); font-weight: 900; font-size: 1.8rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: var(--space-1); }
.lock-subtitle { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: var(--space-6); }
.lock-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px; color: var(--text-primary); text-align: center; font-size: 1rem; outline: none; margin-bottom: var(--space-4); transition: 0.3s; }
.lock-input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }
.lock-btn { width: 100%; background: var(--gradient); border: none; border-radius: 12px; padding: 12px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 25px var(--accent-glow); }
.lock-btn:active { transform: scale(0.98); }
.lock-error { color: var(--orange); font-size: 0.8rem; margin-top: var(--space-3); display: none; }
</style>
</head>
<body>

<!-- ═══════ PASSWORD LOCK SCREEN ═══════ -->

  <div class="lock-card">
    <div class="lock-icon">🔒</div>

    <input type="password" class="lock-input" id="lockInput" placeholder="Password">
    <button class="lock-btn" id="lockUnlockBtn">Unlock</button>
    <div class="lock-error" id="lockError">Incorrect password</div>
  </div>
</div>

<!-- ═══════ PROGRESS BAR ═══════ -->
<div class="progress-bar" id="progressBar"></div>

<!-- ═══════ HEADER ═══════ -->
<div class="header">
  <div>
    <div class="header-title">ConceptFeed</div>
    <div class="header-chapter">Electrostatics · Ch 01</div>
  </div>
  <div class="header-right">
    <div class="pill streak-pill" id="streakPill" title="Daily Streak">
      <span class="emoji">🔥</span>
      <span id="streakCount">0</span>
    </div>
    <div class="pill mood-pill" id="moodPill" title="Change mood">
      <span class="emoji" id="moodPillEmoji">⚡</span>
      <span id="moodPillLabel">Default</span>
    </div>
  </div>
</div>

<!-- ═══════ FEED ═══════ -->

<div class="swipe-hint" id="swipeHint">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  <span>Swipe up</span>
</div>
<div class="edge-flash" id="edgeFlash"></div>
<button class="doubt-fab" id="doubtFab" aria-label="Ask a doubt">?</button>

<!-- ═══════ DOUBT BOTTOM SHEET ═══════ -->

  <div class="doubt-sheet-handle"></div>
  <div class="doubt-sheet-header">
    <div class="doubt-sheet-title">Ask a Doubt <span class="api-badge">QWEN</span></div>
    <button class="doubt-close-btn" id="doubtCloseBtn">✕</button>
  </div>

    <input class="doubt-input" id="doubtInput" type="text" placeholder="Ask anything about this concept…" autocomplete="off">

</div>

<div class="mood-overlay" id="moodOverlay">

  <div class="mood-overlay-sub">How do you want to learn today?</div>
  <div class="mood-options">
    <button class="mood-btn" data-mood="calm"><span class="emoji">😌</span><span class="label">Calm</span></button>
    <button class="mood-btn" data-mood="exam"><span class="emoji">🔥</span><span class="label">Exam</span></button>
    <button class="mood-btn" data-mood="quick"><span class="emoji">🎯</span><span class="label">Quick</span></button>
  </div>
</div>

<script>
/* ============================================================
   CONTENT & DATA FETCHING
   ============================================================ */
let concepts = [];
let currentChapter = localStorage.getItem('cf_chapter') || 'electrostatics';

async function initApp() {
  await loadChapter(currentChapter, false);
}

async function loadChapter(chapter, resetIndex = false) {
  try {
    if (!DB[chapter]) throw new Error("Chapter not found in DB");
    concepts = DB[chapter];
    
    currentChapter = chapter;
    localStorage.setItem('cf_chapter', chapter);
    
    // Update Header
    document.querySelector('.header-chapter').textContent = chapter === 'electrostatics' ? 'Electrostatics · Ch 01' : 'Units & Dimensions · Ch 02';

    if (resetIndex) {
      currentIndex = 0;
      localStorage.setItem('cf_current_index', 0);
    } else {
      currentIndex = parseInt(localStorage.getItem('cf_current_index')) || 0;
    }
    
    buildCards();
    
    // Rebind Observer
    observer.disconnect();
    document.querySelectorAll('.card').forEach(card => observer.observe(card));

    // Snap to card
    setTimeout(() => {
      const targetCard = document.getElementById(`card-${currentIndex}`);
      if (targetCard) {
        feed.style.scrollBehavior = 'auto';
        targetCard.scrollIntoView();
        targetCard.classList.add('is-active');
        updateProgress(currentIndex);
        setTimeout(() => { feed.style.scrollBehavior = ''; }, 50);
      }
    }, 50);

  } catch (err) {
    console.error("Failed to load chapter", err);
    feed.innerHTML = '<div style="color:white;text-align:center;margin-top:50vh;">Failed to load data.</div>';
  }
}

/* ============================================================
   STATE PERSISTENCE & STREAKS (localStorage)
   ============================================================ */
let currentIndex = 0; // Set via loadChapter
let currentMood = localStorage.getItem('cf_mood') || null;
const masteredSet = new Set(JSON.parse(localStorage.getItem('cf_mastered') || '[]'));

// Streak Logic
let streakCount = parseInt(localStorage.getItem('cf_streak')) || 0;
let lastActiveDate = localStorage.getItem('cf_last_active');
const today = new Date().toDateString();

// If last active was > 1 day ago, break streak (simplified logic for prototype)
if (lastActiveDate) {
  const diffTime = Math.abs(new Date(today) - new Date(lastActiveDate));
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
  if (diffDays > 1) {
    streakCount = 0;
    localStorage.setItem('cf_streak', 0);
  }
}
document.getElementById('streakCount').textContent = streakCount;
if(streakCount > 0 && lastActiveDate === today) {
  document.getElementById('streakPill').classList.add('active');
}

function updateStreak() {
  if (lastActiveDate !== today) {
    streakCount++;
    lastActiveDate = today;
    localStorage.setItem('cf_streak', streakCount);
    localStorage.setItem('cf_last_active', today);
    document.getElementById('streakCount').textContent = streakCount;
    document.getElementById('streakPill').classList.add('active');
  }
}

/* ============================================================
   BUILD FEED
   ============================================================ */
const feed = document.getElementById('feed');
const progressBar = document.getElementById('progressBar');

function buildCards() {
  feed.innerHTML = '';
  progressBar.innerHTML = '';

  concepts.forEach((c, i) => {
    const seg = document.createElement('div');
    seg.className = 'progress-segment';
    seg.id = `seg-${i}`;
    if (masteredSet.has(c.id)) seg.classList.add('mastered');
    progressBar.appendChild(seg);

    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;
    card.dataset.index = i;
    if (masteredSet.has(c.id)) card.classList.add('is-mastered');

    card.innerHTML = `
      <div class="card-inner">
        <div class="mastered-badge"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="card-number">Concept ${String(c.id).padStart(2, '0')} / ${String(concepts.length).padStart(2, '0')}</div>
        <div class="card-hook">${c.hook.replace(/\n/g, '<br>')}</div>
        <div class="card-story">${c.story}</div>
        <div class="card-formula"><div>${c.formula.replace(/\n/g, '<br>')}</div><div style="font-size:0.65em;opacity:0.55;margin-top:6px;font-weight:500">${c.formulaSub}</div></div>
        <div class="card-analogy"><span class="analogy-icon">💡</span> ${c.analogy}</div>
        <div class="card-footer"><span class="topic-pill">${c.topic}</span></div>
      </div>
    `;
    feed.appendChild(card);
  });

  // Zeigarnik Effect - Next Chapter End Card
  const endCard = document.createElement('div');
  endCard.className = 'card end-card';
  endCard.dataset.index = concepts.length;
  
  let nextChap = currentChapter === 'electrostatics' ? 'units_dimensions' : 'electrostatics';
  let nextChapName = currentChapter === 'electrostatics' ? 'Units & Dimensions' : 'Electrostatics';

  endCard.innerHTML = `
    <div class="card-inner" style="align-items: center; justify-content: center; text-align: center; padding: 40px;">
      <div style="font-size: 3rem; margin-bottom: 20px;">🔒</div>
      <div class="card-hook">Next Up:<br>${nextChapName}</div>
      <div class="card-story">Unlock the next module. Keep the streak alive!</div>
      <button class="unlock-btn" onclick="loadChapter('${nextChap}', true)">Unlock Chapter</button>
    </div>
  `;
  feed.appendChild(endCard);
}

buildCards();

/* ============================================================
   INTERSECTION OBSERVER & PERSISTENCE
   ============================================================ */
function updateProgress(index) {
  document.querySelectorAll('.progress-segment').forEach((seg, i) => {
    seg.classList.remove('active', 'visited');
    if (i < index) seg.classList.add('visited');
    if (i === index) seg.classList.add('active');
  });
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && entry.intersectionRatio > 0.55) {
      const card = entry.target;
      const idx = parseInt(card.dataset.index);
      
      document.querySelectorAll('.card.is-active').forEach(c => c.classList.remove('is-active'));
      card.classList.add('is-active');
      currentIndex = idx;
      updateProgress(idx);
      
      // Save state
      localStorage.setItem('cf_current_index', idx);

      // Light haptic feedback on scroll
      if(navigator.vibrate && idx !== currentIndex) navigator.vibrate(10);

      if (idx > 0) document.getElementById('swipeHint').classList.add('hidden');
    }
  });
}, { root: feed, threshold: [0.55] });

document.querySelectorAll('.card').forEach(card => observer.observe(card));

// Trigger init
initApp();

/* ============================================================
   WEB AUDIO API (Dopamine Sounds)
   ============================================================ */
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playDing(tier) {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  osc.type = 'sine';
  if (tier === 'common') {
    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
  } else if (tier === 'rare') {
    osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // C6
    osc.type = 'triangle';
  } else {
    osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime); // E6
    osc.frequency.exponentialRampToValueAtTime(1567.98, audioCtx.currentTime + 0.1); // Slide to G6
  }
  
  gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

/* ============================================================
   VARIABLE REWARDS ALGORITHM
   ============================================================ */
function triggerConfetti(cardElement) {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  cardElement.appendChild(container);
  
  const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
  for (let i = 0; i < 40; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + '%';
    conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    conf.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
    conf.style.animationDelay = (Math.random() * 0.2) + 's';
    container.appendChild(conf);
  }
  setTimeout(() => container.remove(), 2500);
}

function triggerTextReward(cardElement, text) {
  const el = document.createElement('div');
  el.className = 'reward-text';
  el.textContent = text;
  cardElement.appendChild(el);
  
  // force reflow
  void el.offsetWidth;
  el.classList.add('show');
  
  setTimeout(() => el.remove(), 1600);
}

/* ============================================================
   SWIPE-RIGHT "MASTERED" GESTURE
   ============================================================ */
let pointerStartX = 0, pointerStartY = 0, pointerStartTime = 0, isTracking = false;

feed.addEventListener('pointerdown', (e) => {
  pointerStartX = e.clientX; pointerStartY = e.clientY; pointerStartTime = Date.now(); isTracking = true;
}, { passive: true });
feed.addEventListener('pointermove', (e) => {
  if (!isTracking) return;
  if (Math.abs(e.clientY - pointerStartY) > Math.abs(e.clientX - pointerStartX) + 10) isTracking = false;
}, { passive: true });
feed.addEventListener('pointerup', (e) => {
  if (!isTracking) return;
  isTracking = false;
  const dx = e.clientX - pointerStartX, dy = e.clientY - pointerStartY, dt = Date.now() - pointerStartTime;
  if (dx > 80 && Math.abs(dx) > Math.abs(dy) * 1.8 && (dx / dt) > 0.25) markMastered(currentIndex);
}, { passive: true });

function markMastered(index) {
  if (index >= concepts.length) return; // End card
  const card = document.getElementById(`card-${index}`);
  const seg = document.getElementById(`seg-${index}`);
  const conceptId = concepts[index].id;

  if (masteredSet.has(conceptId)) return; // Already mastered

  masteredSet.add(conceptId);
  localStorage.setItem('cf_mastered', JSON.stringify([...masteredSet]));
  updateStreak(); // Gamification logic

  card.classList.add('is-mastered', 'mastering');
  seg.classList.add('mastered');

  // Dopamine Variable Rewards Algorithm
  const r = Math.random();
  if (r > 0.90) {
    // Epic Tier (10%)
    playDing('epic');
    if(navigator.vibrate) navigator.vibrate([20, 30, 20, 30, 40]);
    triggerTextReward(card, "PERFECT! 🔥");
    triggerConfetti(card);
  } else if (r > 0.65) {
    // Rare Tier (25%)
    playDing('rare');
    if(navigator.vibrate) navigator.vibrate([15, 30, 15]);
    triggerTextReward(card, "ON FIRE!");
  } else {
    // Common Tier (65%)
    playDing('common');
    if(navigator.vibrate) navigator.vibrate(20);
  }

  const flash = document.getElementById('edgeFlash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  setTimeout(() => card.classList.remove('mastering'), 700);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'm') markMastered(currentIndex);
});

async function callQwenAPI(userMessage, currentConcept) {
  const prompt = `You are an expert JEE physics tutor. The user is currently studying this concept:
Title: ${currentConcept.hook}
Theory: ${currentConcept.story}
Formula: ${currentConcept.formula}

Answer the user's doubt strictly based on this concept.
RULES:
1. Under 50 words ideally, absolute maximum 100 words.
2. Only answer exactly what is asked.
3. No fluff, no greetings.
4. Do NOT use markdown headers or lists, keep it plain text.`;

  const directPayload = {
    model: "qwen-max",
    messages: [
      { role: "system", content: prompt },
      { role: "user", content: userMessage }
    ],
    max_tokens: 150
  };

  const response = await fetch("https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${qwenApiKey}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(directPayload)
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`API ${response.status}: ${errText}`);
  }
  const data = await response.json();
  if (data.error) throw new Error(data.error);
  if (data.choices && data.choices.length > 0 && data.choices[0].message) {
    return data.choices[0].message.content;
  } else {
    throw new Error("Unexpected response: " + JSON.stringify(data));
  }
}

  const uBubble = document.createElement('div');

});

doubtInput.addEventListener('keydown', (e) => {

/* ============================================================
   PASSWORD PROTECTION LOGIC (SHA-256 SECURED)
   ============================================================ */
const targetHash = "0c87ed818fb90f3f88faa6b362cf1e99025f3c1248f8fe513cdb38d03d9dce65"; // SHA-256 of "study"

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

const lockOverlay = document.getElementById('lockOverlay');
const lockInput = document.getElementById('lockInput');
const lockUnlockBtn = document.getElementById('lockUnlockBtn');
const lockError = document.getElementById('lockError');

async function checkUnlock() {
  const inputVal = lockInput.value;
  const hash = await sha256(inputVal);
  if (hash === targetHash) {
    localStorage.setItem('cf_unlocked', 'true');
    lockOverlay.classList.add('hidden');
  } else {
    lockError.style.display = 'block';
    lockInput.value = '';
    setTimeout(() => { lockError.style.display = 'none'; }, 2000);
  }
}

if (localStorage.getItem('cf_unlocked') === 'true') {
  lockOverlay.classList.add('hidden');
} else {
  lockOverlay.classList.remove('hidden');
  setTimeout(() => lockInput.focus(), 300);
}

lockUnlockBtn.addEventListener('click', checkUnlock);
lockInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkUnlock(); });
